<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Web Page</title>
</head>
<body>

    <!-- Main Title -->
    <h1>Welcome to My Website</h1>

    <!-- Subheading -->
    <h2>About Me</h2>

    <!-- Text Paragraph -->
    <p>This is a standard text paragraph. You can easily make words <strong>bold</strong> or <em>italicized</em> using semantic tags.</p>

    <!-- Hyperlink -->
    <p>Check out more resources at <a href="https://www.w3schools.com" target="_blank">W3Schools</a>.</p>

    <!-- Unordered List -->
    <h2>My Favorite Hobbies</h2>
    <ul>
        <li>Coding new projects</li>
        <li>Reading books</li>
        <li>Traveling to new places</li>
    </ul>

    <!-- Embedded Image -->
    <h2>Profile Picture</h2>
    <img src="https://placeholder.com" alt="Placeholder profile picture" width="150" height="150">

</body>
</html>

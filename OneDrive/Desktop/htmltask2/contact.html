<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="style.css">

<title>Contact</title>

</head>

<body>

<header>

<h1>Student Registration</h1>

</header>

<form>

<label for="name">Name</label>

<input
type="text"
id="name"
required>

<label for="email">Email</label>

<input
type="email"
id="email"
required>

<label for="phone">Phone</label>

<input
type="tel"
id="phone"
pattern="[0-9]{10}"
placeholder="9876543210"
required>

<label for="dob">Date of Birth</label>

<input
type="date"
id="dob"
required>

<label for="message">Message</label>

<textarea
id="message"
required></textarea>

<button
type="submit"
aria-label="Submit Form">

Submit

</button>

</form>

</body>

</html>
